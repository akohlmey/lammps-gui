# GitHub action to run static code analysis on C++
name: "CodeQL Code Analysis"

on:
  push:
    branches: [develop]

  workflow_dispatch:

concurrency:
  group: ${{ github.event_name }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{github.event_name == 'pull_request'}}

jobs:
  analyze:
    name: Analyze
    if: ${{ github.repository == 'akohlmey/lammps-gui' }}
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 2

    # No-build mode: CodeQL extracts the sources directly without compiling.
    # This honors the paths filter in cpp.yml (paths are ignored for *built*
    # C/C++), so only src/ is analyzed -- thirdparty/, plugin/, and generated
    # build artifacts (moc_*.cpp) are excluded, and no Qt/CMake toolchain is
    # needed.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: cpp
        build-mode: none
        config-file: ./.github/codeql/cpp.yml

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
