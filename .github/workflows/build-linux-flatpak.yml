# GitHub action to build LAMMPS-GUI as a flatpak bundle
name: "Build LAMMPS-GUI as flatpak bundle"

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

  workflow_dispatch:

concurrency:
  group: ${{ github.event_name }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{github.event_name == 'pull_request'}}

jobs:
  build:
    name: LAMMPS-GUI flatpak build
    if: ${{ github.repository == 'akohlmey/lammps-gui' }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 20

    - name: Install extra packages
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache \
                                libeigen3-dev \
                                libcurl4-openssl-dev \
                                mold \
                                ninja-build \
                                python3-dev \
                                flatpak \
                                flatpak-builder

    - name: Set up access to flatpak repo
      run: flatpak --user remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

    - name: Build flatpak
      run: |
        mkdir -p flatpak-state

        # Use a Flatpak-safe branch name (no "/"), especially for pull_request refs like "78/merge"
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          FB_BRANCH="pr-${{ github.event.pull_request.number }}"
        else
          FB_BRANCH="${{ github.ref_name }}"
        fi

        # IMPORTANT: don't rewrite the manifest's git source branch to pr-<n> (it doesn't exist on the remote)
        flatpak-builder --force-clean --verbose --repo=flatpak-repo \
          --install-deps-from=flathub --state-dir=flatpak-state \
          --user --ccache --default-branch="${FB_BRANCH}" \
          flatpak-build packaging/org.lammps.lammps-gui.yml

        flatpak build-bundle --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo \
          --verbose flatpak-repo LAMMPS-GUI-Linux-x86_64.flatpak \
          org.lammps.lammps-gui "${FB_BRANCH}"

        flatpak install -y -v --user LAMMPS-GUI-Linux-x86_64.flatpak
